<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Founded-Cutscene // DIM1</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            background-color: #ffffff; /* Изначально белый экран */
            overflow: hidden;
            font-family: 'Arial Black', 'Impact', sans-serif;
        }

        /* Линия под заголовком */
        .header-line {
            width: 100%;
            height: 2px;
            background-color: #eeeeee;
            margin-top: 10px;
        }

        /* Контейнер стартового меню */
        #init-screen {
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #fff;
            z-index: 10000;
            transition: opacity 1s ease-in-out;
        }

        #init-screen h1 {
            font-size: 38px;
            color: #222222;
            font-weight: 900;
            letter-spacing: -1px;
        }

        /* КОНТЕЙНЕР ДЛЯ АКТИВАЦИИ КАТСЦЕНЫ */
        #cutscene-container {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-color: #08020f;
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* ЭФФЕКТ СТАРОГО МОНИТОРА */
        .crt::before {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(30, 5, 50, 0.15) 50%);
            z-index: 10001;
            background-size: 100% 4px;
            pointer-events: none;
        }

        /* ФИОЛЕТОВЫЙ ДЫМ ПО РАМКАМ ЭКРАНА */
        .smoke-border {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 50;
            box-shadow: inset 0 0 80px rgba(100, 20, 160, 0.8),
                        inset 0 0 150px rgba(45, 5, 75, 0.9),
                        inset 0 0 300px rgba(13, 1, 23, 1);
            animation: smoke-pulse 4s infinite alternate ease-in-out;
        }

        @keyframes smoke-pulse {
            0% { box-shadow: inset 0 0 80px rgba(100, 20, 160, 0.7), inset 0 0 150px rgba(45, 5, 75, 0.8), inset 0 0 300px rgba(13, 1, 23, 1); }
            100% { box-shadow: inset 0 0 110px rgba(140, 30, 220, 0.9), inset 0 0 200px rgba(70, 10, 110, 0.95), inset 0 0 350px rgba(25, 2, 40, 1); }
        }

        /* ПЕПЕЛ НА ЭКРАНЕ */
        .ash-particle {
            position: fixed;
            background: linear-gradient(135deg, #b57cff 0%, #30054a 100%);
            border-radius: 2px;
            pointer-events: none;
            z-index: 40;
            opacity: 0.6;
            animation: fall linear infinite;
        }

        @keyframes fall {
            0% { transform: translateY(-20px) rotate(0deg); opacity: 0.8; }
            100% { transform: translateY(105vh) rotate(360deg); opacity: 0; }
        }

        /* ТЕКСТ СУЩНОСТИ */
        .lore-text {
            color: #dfbfff;
            font-size: 26px;
            font-family: 'Courier New', Courier, monospace;
            text-align: center;
            max-width: 80%;
            line-height: 1.6;
            text-shadow: 0 0 12px #b57cff, 0 0 25px #6600cc;
            opacity: 0;
            transition: opacity 1.5s ease-in-out;
            z-index: 100;
        }

        /* РИМСКИЙ СЧЕТЧИК */
        #roman-counter {
            display: none;
            color: #ffb3ff;
            font-size: 100px;
            font-weight: bold;
            text-shadow: 0 0 20px #ff00ff, 0 0 40px #aa00aa;
            font-family: 'Times New Roman', Times, serif;
            z-index: 100;
        }

        /* ТРЕЩИНЫ */
        .glass-crack {
            position: fixed;
            background: rgba(0, 0, 0, 0.95);
            box-shadow: 0 0 8px #b57cff;
            pointer-events: none;
            z-index: 99999;
        }
    </style>
</head>
<body>

    <div id="init-screen">
        <h1>Founded-Cutscene</h1>
        <div class="header-line"></div>
    </div>

    <div id="cutscene-container" class="crt">
        <div class="smoke-border"></div>
        <div class="lore-text" id="lore-field"></div>
        <div id="roman-counter">I</div>
    </div>

    <script>
        const phrases = [
            "Знаешь ли ты насколько этот мир мал?",
            "Сколько прошло сезонов, как я не уйду от вас?",
            "Вы рады событию, но не знаете что приближается",
            "Мои бесчисленные глаза наблюдают за вами",
            "Не смейте мне противостоять",
            "Ты не имеешь догадок, в симуляции ли ты или нет"
        ];
        const secretPhrase = "Ты знаешь? Когда я физически внедрюсь в ваш мир?";

        function toRoman(num) {
            const lookup = {XC:90,L:50,XL:40,X:10,IX:9,V:5,IV:4,I:1};
            let roman = '';
            for (let i in lookup) {
                while (num >= lookup[i]) {
                    roman += i;
                    num -= lookup[i];
                }
            }
            return roman;
        }

        // Автоматический старт при полной загрузке страницы на GitHub
        window.onload = function() {
            setTimeout(() => {
                const initScreen = document.getElementById('init-screen');
                initScreen.style.opacity = '0';
                
                setTimeout(() => {
                    initScreen.style.display = 'none';
                    startCutsceneLogic();
                }, 1000);
            }, 1500); // Показываем белый экран 1.5 секунды перед провалом в бездну
        };

        function startCutsceneLogic() {
            spawnAsh();
            playDarkAmbient();

            // Выбор фразы (0.1% шанс на секретную)
            const isSecret = Math.random() < 0.001;
            const chosenText = isSecret ? secretPhrase : phrases[Math.floor(Math.random() * phrases.length)];
            
            const textField = document.getElementById('lore-field');
            textField.innerText = chosenText;

            // Плавно проявляем текст
            setTimeout(() => { textField.style.opacity = 1; }, 200);

            // Через 4.5 секунды гасим текст и включаем счетчик
            setTimeout(() => {
                textField.style.opacity = 0;
                setTimeout(() => {
                    textField.style.display = 'none';
                    runRomanCounter();
                }, 1500);
            }, 4500);
        }

        function spawnAsh() {
            for (let i = 0; i < 50; i++) {
                createAshParticle();
            }
        }

        function createAshParticle() {
            const particle = document.createElement('div');
            particle.classList.add('ash-particle');
            let size = Math.random() * 4 + 2;
            particle.style.width = size + 'px';
            particle.style.height = size + 'px';
            particle.style.left = Math.random() * window.innerWidth + 'px';
            
            let duration = Math.random() * 5 + 3;
            particle.style.animationDuration = duration + 's';
            particle.style.animationDelay = '-' + Math.random() * 5 + 's';

            document.getElementById('cutscene-container').appendChild(particle);
            
            setTimeout(() => {
                particle.remove();
                createAshParticle();
            }, duration * 1000);
        }

        function runRomanCounter() {
            const counterEl = document.getElementById('roman-counter');
            counterEl.style.display = 'block';

            let currentNum = 1;
            let currentDelay = 200; 

            function tick() {
                if (currentNum > 90) {
                    shatterScreen();
                    return;
                }
                counterEl.innerText = toRoman(currentNum);
                currentNum++;
                currentDelay = Math.max(6, currentDelay * 0.93); 
                setTimeout(tick, currentDelay);
            }
            tick();
        }

        function shatterScreen() {
            document.getElementById('roman-counter').style.display = 'none';

            for (let i = 0; i < 40; i++) {
                setTimeout(() => {
                    const crack = document.createElement('div');
                    crack.classList.add('glass-crack');
                    let x = Math.random() * window.innerWidth;
                    let y = Math.random() * window.innerHeight;
                    let length = Math.random() * 300 + 60;
                    
                    crack.style.left = x + 'px';
                    crack.style.top = y + 'px';
                    crack.style.width = length + 'px';
                    crack.style.height = '3px';
                    crack.style.transform = `rotate(${Math.random() * 360}deg)`;
                    
                    document.body.appendChild(crack);
                }, i * 20);
            }

            setTimeout(() => {
                window.location.href = "https://www.google.com";
            }, 1500);
        }

        function playDarkAmbient() {
            try {
                let context = new (window.AudioContext || window.webkitAudioContext)();
                let osc = context.createOscillator();
                let gain = context.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(50, context.currentTime);
                gain.gain.setValueAtTime(0.2, context.currentTime);
                osc.connect(gain);
                gain.connect(context.destination);
                osc.start();
            } catch(e){}
        }
    </script>
</body>
</html>
